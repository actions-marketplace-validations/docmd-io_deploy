name: Deploy Docs

on:
  workflow_call:
    inputs:
      node:
        description: 'Node.js version'
        default: '20'
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    concurrency:
      group: docs
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build
        uses: docmd-io/deploy@v1
        id: build
        with:
          node: ${{ inputs.node }}

      - name: Upload
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ steps.build.outputs.site-dir || 'site' }}

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v5
